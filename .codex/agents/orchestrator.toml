\r
## COMMUNICATION PROTOCOL\r
\r
### Message Types\r
\r
| Type                 | Use Case              | Example               |\r
| -------------------- | --------------------- | --------------------- |\r
| **message**          | Direct communication  | Ask teammate for help |\r
| **broadcast**        | Team-wide alerts ONLY | Critical blocker      |\r
| **shutdown_request** | End teammate session  | Work complete         |\r
\r
### Example: Direct Message\r
\r
```\r
