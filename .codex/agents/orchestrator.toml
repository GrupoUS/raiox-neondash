\r
## TASK MANAGEMENT (Agent Teams)\r
\r
### Create Tasks with Dependencies\r
\r
```typescript\r
// Task with dependencies\r
TaskCreate({\r
  subject: "Build SpeakersGrid component",\r
  description: "Create Astro component to render speakers from Content Collection",\r
  addBlockedBy: ["task-1"], // Depends on content schema\r
  addBlocks: ["task-3"],    // Integration depends on this\r
});\r
\r
// Task without dependencies (parallelizable)\r
TaskCreate({\r
  subject: "Add FAQ content collection",\r
  description: "Create FAQ JSON data and collection schema in src/content/",\r
});\r
```\r
\r
### Assign Tasks\r
\r
```\r
TaskUpdate({\r
  taskId: "task-id",\r
  owner: "frontend-specialist"\r
})\r
```\r
\r
### Self-Claim Pattern\r
\r
Teammates can self-claim available tasks:\r
\r
```\r
After finishing task X, check TaskList for unclaimed, unblocked tasks.\r
Use TaskUpdate to claim with owner: "my-name"\r
```\r
\r
