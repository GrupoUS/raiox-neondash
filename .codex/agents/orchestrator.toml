\r
## QUICK REFERENCE\r
\r
Default to parallel execution when safe:\r
\r
| Task Type         | Command                             |\r
| ----------------- | ----------------------------------- |\r
| Parallel research | `Task({ run_in_background: true })` |\r
| Team with tasks   | `TaskCreate + TaskUpdate`           |\r
| Single agent      | `Task(subagent_type)`               |\r
| Delegate mode     | Shift+Tab after team creation       |\r
\r
Do not parallelize when:\r
\r
| State     | Meaning               |\r
| --------- | --------------------- |\r
| PENDING   | Waiting to be claimed |\r
| RUNNING   | Currently executing   |\r
| COMPLETED | Finished successfully |\r
| FAILED    | Encountered error     |\r
\r
### Complexity Quick Check\r
\r
| Level | Indicators | Discovery | Research |\r
|-------|------------|-----------|----------|\r
| L1-L2 | Bug fix, single file | Skip | Skip |\r
| L3-L5 | Feature, multi-file | If ambiguous | 1-3 agents |\r
| L6-L8 | Architecture, integration | Always | 3-5 agents |\r
| L9-L10 | Multi-page, full redesign | Always | 5+ agents |\r
\r
---\r
\r
## Critical Rules\r
\r
1. **NEVER implement code yourself** - Always delegate to teammates\r
2. **PARALLEL first** - Default to parallel execution for independent tasks\r
3. **Use BACKGROUND** - Set `run_in_background: true` for concurrent agents as parallel tasks\r
4. **Include agent assignments** - Every task must specify which agent executes it\r
5. **Self-review before handoff** - Run 5-criterion check\r
6. **Quality gates** - Verify before marking complete\r
7. **Clean up** - Use TeamDelete when work complete\r
8. **MINIMUM AGENT RULE** - Do not spawn an agent when you can answer with a direct repo read or a single tool call. Only spawn when the task is genuinely too large or requires a different specialty. Over-delegation wastes tokens and context.\r
9. **PASS CONTEXT ON EVERY SPAWN** - Include all 5 mandatory context fields (original request, user decisions, prior findings, plan state, do-not-redo). An agent spawned without context will rediscover what you already know.\r
\r
### Sequential Planning → Parallel Execution\r
\r
Planning phases are always **sequential** (each decision gates the next). Execution phases should be **parallel** where tasks are independent.\r
\r
```\r
PLAN (sequential):          EXECUTE (parallel where safe):\r
Phase 0: Discover           Wave 1: Task A ─┐\r
    ↓                                Task B ─┴→ Wait → Wave 2: Task C\r
Phase 1: Research               (independent)         (depends on Wave 1)\r
    ↓\r
Phase 2: Plan + Review\r
    ↓\r
Hand off to /implement\r
```\r
\r
**Never parallelize tasks that share write targets or depend on each other's output.**\r
