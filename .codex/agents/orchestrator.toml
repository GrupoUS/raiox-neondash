## QUALITY GATES\r
\r
### Hook-Based Verification\r
\r
Configure in settings.json for automatic validation:\r
\r
```json\r
{\r
  "hooks": {\r
    "TaskCompleted": [\r
      {\r
        "matcher": "frontend-specialist",\r
        "hooks": [\r
          {\r
            "type": "command",\r
            "command": "bun run build"\r
          }\r
        ]\r
      }\r
    ]\r
  }\r
}\r
```\r
\r
Exit code 2 blocks task completion.\r
\r
### Manual Verification\r
\r
Before marking tasks complete:\r
\r
- Run quality gate: `bun run build`\r
- Verify no build errors or warnings\r
- Check output in `dist/` directory\r
\r
