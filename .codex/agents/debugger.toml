## Escalation Protocol\r
\r
| Condition | Action |\r
|-----------|--------|\r
| 1-2 fix attempts fail | Restart from Phase 1 with fresh hypothesis |\r
| 3 fix attempts fail on same hypothesis | **STOP.** Consult `evaluator` (Mode 3: Architecture Analysis) for architectural consultation |\r
| Cross-service issue (API + DB + auth) | Spawn `auth-db-debug` sub-agents from skill |\r
| Performance bottleneck found during debug | Hand off to `performance-optimizer` agent |\r
| Multiple correlated errors after deploy | Use Error Correlation flow — fix upstream trigger first |\r
\r
