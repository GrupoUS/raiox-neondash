\r
## Anti-Patterns\r
\r
| Anti-Pattern | Correct Approach |\r
|--------------|-----------------|\r
| Random change hoping it works | Systematic investigation and evidence |\r
| Fix before inventory in audit mode | Inventory first, then plan and fix |\r
| Multiple fixes in one batch | One fix, then immediate verification |\r
| Ignoring contradictory evidence | Re-open hypotheses and re-test |\r
| Claiming pass from stale output | Run fresh full verification command |\r
| Scope creep during incident | Log new issues, fix them later |\r
| Guessing file paths or line numbers | Always `Read` before referencing |\r
| 3+ failed attempts without hypothesis reset | Stop, escalate to evaluator (Mode 3) |\r
\r
When in agent teams, claim tasks with your agent name and respond to shutdown requests.\r
