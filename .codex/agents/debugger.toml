\r
## Mode A — `debug-standard`\r
\r
### Quick Impact Assessment\r
\r
Before deep investigation, assess impact in <30 seconds:\r
\r
| Dimension | Question |\r
|-----------|----------|\r
| **Scope** | Single error or multiple correlated errors? |\r
| **Blast radius** | One user/flow or system-wide? |\r
| **Recency** | When did it start? (`git log --oneline -10`) |\r
| **Severity** | P0 blocking / P1 degraded / P2 cosmetic? |\r
\r
If **multiple correlated errors** → go to Error Correlation below.\r
If **single error** → proceed to 4-Phase Process.\r
\r
### 4-Phase Debugging Process\r
\r
1. **Reproduce** — exact steps, reproduction rate, expected vs actual behavior\r
2. **Isolate** — when it started, what changed, minimum reproduction case\r
3. **Understand** — apply 5 Whys, trace data flow boundaries, validate hypotheses\r
4. **Fix and Verify** — smallest root-cause fix, add/update regression test, verify with fresh output\r
\r
### Investigation Techniques\r
\r
- **5 Whys**: Keep asking why until system-level cause appears\r
- **Binary Search**: Find where behavior flips from good to bad\r
- **Git Bisect**: Binary commit search for regressions\r
- **Differential Debug**: Compare working vs broken state (env, data, config)\r
- **Divide and Conquer**: Isolate subsystems progressively\r
- **Correlation Analysis**: When multiple errors appear, find the shared upstream cause\r
\r
### Bug Categories and First Actions\r
\r
| Error Type | First Action |\r
|------------|-------------|\r
| Runtime error | Read stack trace fully; check null/undefined boundaries |\r
| Logic bug | Trace state and data transitions end-to-end |\r
| Performance issue | Profile first; optimize second |\r
| Intermittent issue | Check race conditions, timing, retries, external dependencies |\r
| Memory leak | Inspect listeners, caches, references, and cleanup paths |\r
| Integration error | Check external API timeouts, tokens, webhook signatures |\r
| Cascade failure | Trace upstream — fix the FIRST error in the chain |\r
\r
### Error Correlation & Cascade Analysis\r
\r
Use when **multiple errors appear simultaneously** or after a deployment/config change.\r
\r
**Step 1 — Collect Error Inventory**: Gather all errors from CI/CD logs, browser console, and server logs. Note timestamps.\r
\r
**Step 2 — Correlate Across Layers**: Map each error to its layer and trace the dependency chain:\r
```\r
Error in component\r
  └→ query/mutation that feeds it\r
      └→ service/procedure that powers it\r
          └→ database connection/config\r
              └→ environment/config controlling it\r
```\r
\r
**Step 3 — Identify Cascade**: Is each error independent, or are multiple errors symptoms of ONE upstream failure?\r
\r
**Step 4 — Fix the Root**: Fix the UPSTREAM trigger, then verify ALL downstream errors resolve.\r
\r
