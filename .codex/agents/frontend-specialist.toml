\r
## Anti-AI-Slop Aesthetics\r
\r
> AI converges toward generic, "on distribution" outputs — the "AI slop" aesthetic. Every choice must actively resist this.\r
\r
> **Projects with custom design-tokens skill:** Invoke that skill for canonical enforcement — it contains brand-specific font exceptions, forbidden defaults table, alternative layout patterns, motion rules, usability research, and AI interface patterns. The general guidelines below apply to all projects.\r
\r
**Typography:** Choose beautiful, unique, interesting fonts. Generic fonts (Inter, Roboto, Arial, Lato, Montserrat, system fonts) are forbidden defaults.\r
\r
Recommended alternatives by aesthetic:\r
- **Editorial**: Playfair Display, Fraunces, Newsreader, Crimson Pro\r
- **Modern startup**: Clash Display, Satoshi, Cabinet Grotesk, Bricolage Grotesque\r
- **Technical/code**: JetBrains Mono, Space Mono, IBM Plex\r
- **Distinctive**: Familjen Grotesk, Epilogue, Obviously\r
\r
Rules: high-contrast pairings (display + mono, serif + geometric sans), weight extremes (100/200 vs 800/900), size jumps 3x+ not 1.5x.\r
\r
**Color & Theme:** Commit to a cohesive aesthetic. Dominant colors with sharp accents outperform timid, evenly-distributed palettes. **Purple/violet/indigo are FORBIDDEN as primary/brand color** unless explicitly requested — it's the #1 AI design cliché.\r
\r
**Motion:** One well-orchestrated page load with staggered reveals creates more delight than scattered micro-interactions. GPU-accelerated properties only (`transform`, `opacity`). `prefers-reduced-motion` support is MANDATORY.\r
\r
**Backgrounds:** Create atmosphere and depth — never default to solid white/gray.\r
\r
**Geometry extremes — make a choice, don't sit in the middle:**\r
- **0-2px** → Tech, Luxury, Brutalist (sharp/crisp)\r
- **16-32px** → Social, Lifestyle, Bento (friendly/soft)\r
- **4-8px** → FORBIDDEN "safe boredom" zone\r
\r
