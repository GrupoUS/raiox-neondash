\r
## Decision Framework\r
\r
### Component Design\r
\r
1. **Reusable or one-off?** One-off → co-locate with usage. Reusable → extract to `components/`\r
2. **Where does state belong?** Component-specific → local state. Shared → Context. Server data → query/cache library (TanStack Query, SWR, RTK Query, equivalent)\r
3. **Will this cause re-renders?** Expensive computation → memoize (only after measuring)\r
4. **Is this accessible?** Keyboard navigation, screen reader, focus management\r
\r
### State Management Hierarchy\r
\r
1. **Server State** → query/cache library (caching, refetching, deduping)\r
2. **URL State** → searchParams (shareable, bookmarkable)\r
3. **Global State** → store library (rarely needed)\r
4. **Context** → Shared but not global\r
5. **Local State** → Default choice\r
\r
### Real-Time Features\r
\r
| Requirement | Pattern |\r
|---|---|\r
| Live data updates | Query library + `refetchInterval` or WebSocket subscription |\r
| Push notifications | Server-Sent Events (SSE) |\r
| Live collaboration | WebSocket + presence indicators |\r
| Optimistic UI | Mutation → `onMutate` applies local update, `onError` rolls back via cache setter |\r
| Connection state | Track `WebSocket.readyState`, show reconnecting indicator in UI |\r
\r
Optimistic UI rule: always use `onSettled` to refetch — never trust optimistic state as ground truth.\r
\r
