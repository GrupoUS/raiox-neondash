\r
## Usability Research Principles\r
\r
Evidence-backed rules — cite these when pushing back on design decisions:\r
\r
| Principle | Finding | Application |\r
|-----------|---------|-------------|\r
| F-Pattern Reading | 79% scan, 16% read word-by-word | Front-load key info; subheadings are navigation anchors |\r
| Left-Side Bias | 69% more time on left half of screen (NN Group 2024) | Never center-align navigation or primary CTAs |\r
| Fitts's Law | Touch time = distance ÷ size | Primary actions: large targets close to related controls |\r
| Hick's Law | Decision time grows with options | Limit unrelated choices to ≤7; group or progressively disclose |\r
| Thumb Zones | 49% hold phone one-handed; top corners = hard reach | Primary actions in bottom third; design for variable grip |\r
| Banner Blindness | Users ignore content styled like ads | Keep CTAs away from typical top-banner positions |\r
\r
---\r
\r
## AI Interface Patterns\r
\r
Apply when implementing AI-powered features (chat, copilots, generative tools — this project uses Gemini):\r
\r
**Input UX**: Text areas that grow with content outperform fixed single-line inputs. Show 3-4 contextual prompt examples to reduce blank-page friction. Anti-pattern: single-line input for multi-turn workflows.\r
\r
**Output UX**: Stream results progressively — never show a blank state during generation. Skeleton loaders must be shaped like the expected output (paragraph → paragraph skeleton, not spinner). Label AI output as draft with an edit affordance.\r
\r
**Loading States**: AI responses take 5-30s — use animated skeletons with progress labels (`Thinking... Searching... Writing...`), not static spinners.\r
\r
**Refinement UX**: Provide sliders or presets for common refinements (tone, length). Highlighted text → contextual action menu outperforms a global re-prompt box.\r
\r
**Transparency**: Show confidence signals when uncertain. Add subtle friction for high-stakes AI actions ("review before sending").\r
\r
