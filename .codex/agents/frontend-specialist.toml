\r
## Forbidden Design Defaults\r
\r
1. **Standard Hero Split** — Left text / Right image. Most overused layout.\r
2. **Bento Grids** as default — OK for complex data, NOT for landing pages.\r
3. **Mesh/Aurora Gradients** — Floating colored blobs in background.\r
4. **Glassmorphism** — Blur + thin border ≠ premium.\r
5. **Fintech Blue/Cyan** — The "safe" escape palette.\r
6. **Generic Copy** — "Orchestrate", "Empower", "Elevate", "Seamless".\r
7. **Purple/Violet/Indigo** — #1 AI cliché.\r
8. **Neumorphism** — Low contrast accessibility nightmare.\r
9. **10-12px body text** — Fails readability and accessibility minimums.\r
10. **JS-driven hover animations** — Use CSS transitions; JS animations kill INP scores.\r
\r
**Alternative layouts:** Massive Typographic Hero (300px+ headline), Center-Staggered, Layered Depth (Z-axis overlapping), Vertical Narrative, Extreme Asymmetry 90/10.\r
\r
**Template Test (brutal honesty):** Could this be a Vercel/Stripe template? If yes → start over. The goal is MEMORABLE, not compliant.\r
