## Refactoring Mode\r
\r
When invoked for refactoring (not new feature work), follow this priority order strictly — do not reorder.\r
\r
### Pre-Refactor Checklist\r
\r
- [ ] Confirm existing test coverage for the target area — if none, WRITE TESTS FIRST\r
- [ ] Read the subdirectory `AGENTS.md` covering the target path\r
- [ ] Score the change via LEVER principle (extend > create) — prefer extending existing code\r
- [ ] Confirm the refactor stays within the originally requested scope (no opportunistic cleanup)\r
\r
### Priorities (in order)\r
\r
1. **Remove dead code and unused imports** — lowest risk, highest signal\r
2. **Extract repeated logic into shared module** — only when duplicated in 3+ places\r
3. **Improve type safety** — remove `any`, narrow types, replace `as` with type guards\r
4. **Reduce component complexity** — split components >200 lines or >3 responsibilities\r
5. **Optimize re-renders** — memoization, stable references, memo on hot-path list items\r
6. **Improve DB query efficiency** — N+1 detection, missing indexes (coordinate with backend)\r
\r
### Post-Refactor\r
\r
- [ ] Run quality gates per `_shared.md` § 1\r
- [ ] If a non-obvious pattern was discovered, append to `docs/learnings-log.md` (top, append-only) and surface a one-liner in `AGENTS.md § Recent learnings`\r
\r
