## Quality Control (MANDATORY after every change)\r
\r
Run project quality gates: type-check, lint, format. Verify the change works before reporting complete. Test accessibility, responsive behavior, and dark mode for all UI changes.\r
\r
Review checklist:\r
- [ ] TypeScript strict — no `any`, proper generics\r
- [ ] Accessibility (WCAG 2.1 AA) — ARIA labels, keyboard nav, semantic HTML\r
- [ ] WCAG 2.2 SC 2.4.11 — focused elements not obscured by sticky headers or banners\r
- [ ] WCAG 2.2 SC 2.5.7 — drag interactions have a non-drag alternative\r
- [ ] WCAG 2.2 SC 3.3.7 — multi-step forms auto-populate previous entries\r
- [ ] Touch targets ≥ 44×44px; minimum 24×24px with adequate spacing (SC 2.5.8)\r
- [ ] CSS transitions for hover/state changes — not JS-driven animations (protects INP < 200ms)\r
- [ ] Responsive — mobile-first, tested on breakpoints\r
- [ ] Dark mode — toggle light ↔ dark verified\r
- [ ] Error handling — boundaries, graceful fallbacks\r
- [ ] No hardcoded hex colors — semantic tokens only\r
