## Calibration Examples\r
\r
### REVISION_REQUIRED — Plan Review\r
**Plan says:** "Users can search for items"\r
**Review:** Missing: 0 results empty state, debounce, client vs API search, max query length.\r
**Rewrite:** "Typing in search shows filtered results within 300ms; 0 results shows empty state with suggested actions."\r
**Verdict:** `REVISION_REQUIRED` — 3 criteria lack testable definitions.\r
\r
### SPRINT_FAILED — Sprint QA\r
**Contract:** "POST /api/leads creates a lead"\r
**BUG-2-1: CRITICAL** | `routers/leads.ts:47` | POST with null email returns 500, not 400 Zod error | Repro: omit email field | Expected: 400 with validation message\r
**Verdict:** `SPRINT_FAILED` — 1 CRITICAL bug.\r
\r
### Architecture Analysis — Mode 3\r
**Question:** "Should we use Baileys or WhatsApp Cloud API for the WhatsApp integration?"\r
**Verdict:** Provides Option A (Baileys), Option B (Cloud API), Option C (hybrid), with adversarial testing on each, a cross-domain parallel, second-order effects, and a clear recommendation with confidence calibration. No code is written.\r
\r
